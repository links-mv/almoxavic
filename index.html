<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxavic | Gestão de EPI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00529b">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #00529b; 
            --primary-hover: #003f7a;
            --accent: #EF7A1D; 
            --bg-dark: #f0f2f5; 
            --bg-card: #ffffff; 
            --text-main: #333333;
            --text-light: #666666;
            --border: #e1e4e8;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .card { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 400px; 
        }

        .header-logo {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary);
        }

        .header-logo i { font-size: 2.5rem; margin-bottom: 10px; }
        
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { 
            position: absolute; 
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--text-light); 
        }
        
        input, select { 
            width: 100%; 
            padding: 14px 14px 14px 45px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background: #f9fafb; 
            color: var(--text-main); 
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(0, 82, 155, 0.1); }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-size: 1rem;
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        button:hover { background: var(--primary-hover); }
        button.btn-accent { background: var(--accent); }
        button.btn-accent:hover { background: #d66a15; }
        button.btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); margin-top: 15px; }
        button.btn-outline:hover { background: var(--primary); color: white; }

        /* Status Toast */
        #status-message {
            display: none;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .status-error { background: #fee2e2; color: #991b1b; }
        .status-success { background: #dcfce7; color: #166534; }
        .status-loading { background: #e0f2fe; color: #075985; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-logo">
            <i class="fa-solid fa-helmet-safety"></i>
            <h2>Almoxavic</h2>
            <p style="font-size: 0.85rem; color: #666;">Gestão de EPIs</p>
        </div>

        <div id="status-message"></div>

        <div id="screen-login" class="screen active">
            <div class="input-group">
                <i class="fa-solid fa-id-badge"></i>
                <input type="text" id="login-user" placeholder="Matrícula (ID)">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-pass" placeholder="Senha">
            </div>
            <button onclick="fazerLogin()"><i class="fa-solid fa-right-to-bracket"></i> Acessar</button>
        </div>

        <div id="screen-menu" class="screen">
            <button onclick="navigateTo('retirada')"><i class="fa-solid fa-arrow-up-right-from-square"></i> Fazer Retirada</button>
            <button class="btn-accent" onclick="navigateTo('entrada')" style="margin-top:15px;"><i class="fa-solid fa-arrow-right-to-bracket"></i> Realizar Entrada</button>
            <button class="btn-outline" onclick="navigateTo('login')"><i class="fa-solid fa-power-off"></i> Sair</button>
        </div>

        <div id="screen-retirada" class="screen">
            <h3 style="margin-bottom: 15px; text-align: center; color: var(--primary);">Saída de EPI</h3>
            <div class="input-group">
                <i class="fa-solid fa-box"></i>
                <input type="number" id="out-id" placeholder="ID do Item">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-hashtag"></i>
                <input type="number" id="out-qtd" placeholder="Quantidade">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="out-colab" placeholder="Nome/Responsável">
            </div>
            <button onclick="confirmarOperacao('Retirada')"><i class="fa-solid fa-check"></i> Confirmar Saída</button>
            <button class="btn-outline" onclick="navigateTo('menu')">Voltar</button>
        </div>

        <div id="screen-entrada" class="screen">
            <h3 style="margin-bottom: 15px; text-align: center; color: var(--accent);">Entrada de EPI</h3>
            <div class="input-group">
                <i class="fa-solid fa-box"></i>
                <input type="number" id="in-id" placeholder="ID do Item">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-hashtag"></i>
                <input type="number" id="in-qtd" placeholder="Quantidade">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-file-invoice"></i>
                <input type="text" id="in-ref" placeholder="Referência/Nota">
            </div>
            <button class="btn-accent" onclick="confirmarOperacao('Entrada')"><i class="fa-solid fa-check"></i> Confirmar Entrada</button>
            <button class="btn-outline" onclick="navigateTo('menu')">Voltar</button>
        </div>
    </div>

    <script>
        // --- COLE AQUI SUA URL DO WEB APP ---
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwGEVPy-SUAsQi_HNd1y6JDMqRl4BSrDmofxO23ODEi5GAOb08gJijVHjm2vtJN2dza/exec";
        // ------------------------------------

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            limparInputs();
            esconderStatus();
        }

        function mostrarStatus(mensagem, tipo) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.textContent = mensagem;
            statusDiv.className = `status-${tipo}`;
            statusDiv.style.display = 'block';
        }

        function esconderStatus() {
            document.getElementById('status-message').style.display = 'none';
        }

        function limparInputs() {
            document.querySelectorAll('input').forEach(input => input.value = '');
        }

        async function fazerLogin() {
            const id = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            if(!id || !pass) return mostrarStatus("Preencha todos os campos!", "error");

            mostrarStatus("Autenticando...", "loading");

            try {
                const response = await fetch(`${URL_GAS}?id=${id}&password=${pass}`);
                const data = await response.json();
                
                if (data.autorizado) {
                    navigateTo('menu');
                } else {
                    mostrarStatus("Matrícula ou senha incorretos!", "error");
                }
            } catch (error) {
                mostrarStatus("Erro de conexão.", "error");
            }
        }

        async function confirmarOperacao(tipo) {
            const prefix = tipo === 'Retirada' ? 'out' : 'in';
            const idItem = document.getElementById(`${prefix}-id`).value;
            const qtd = document.getElementById(`${prefix}-qtd`).value;
            const responsavel = document.getElementById(tipo === 'Retirada' ? 'out-colab' : 'in-ref').value;

            if(!idItem || !qtd || !responsavel) {
                return mostrarStatus("Preencha todos os campos!", "error");
            }

            mostrarStatus("Processando...", "loading");

            const payload = {
                tipo: tipo,
                idItem: idItem,
                qtd: qtd,
                responsavel: responsavel,
                dataHora: new Date().toLocaleString('pt-BR')
            };

            try {
                // Usando text/plain para evitar problemas de CORS no Google Apps Script
                await fetch(URL_GAS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                alert(tipo + " registrada com sucesso!");
                navigateTo('menu');
            } catch (error) {
                mostrarStatus("Erro ao registrar operação.", "error");
            }
        }
    </script>
</body>
</html>

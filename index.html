<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxavic | Gestão de EPI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0068B5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0068B5; --accent: #EF7A1D; --bg-dark: #0a111a; --bg-card: #111e2f; --text-main: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 16px; max-width: 400px; margin: auto; }
        .screen { display: none; }
        .screen.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #1a2a40; color: white; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="card">
            <h2 style="text-align:center;">Login</h2>
            <input type="text" id="login-user" placeholder="Matrícula (ID)">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="fazerLogin()">Acessar</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="card">
            <h2>Bem-vindo</h2>
            <button onclick="navigateTo('retirada')">Fazer Retirada</button>
            <button onclick="navigateTo('entrada')" style="margin-top:10px;">Realizar Entrada</button>
        </div>
    </div>

    <div id="screen-retirada" class="screen">
        <div class="card">
            <input type="number" id="out-id" placeholder="ID do Item">
            <input type="number" id="out-qtd" placeholder="Quantidade">
            <input type="text" id="out-colab" placeholder="Nome/Responsável">
            <button onclick="confirmarOperacao('Retirada')">Confirmar Saída</button>
        </div>
    </div>

    <div id="screen-entrada" class="screen">
        <div class="card">
            <input type="number" id="in-id" placeholder="ID do Item">
            <input type="number" id="in-qtd" placeholder="Quantidade">
            <input type="text" id="in-ref" placeholder="Referência/Nota">
            <button onclick="confirmarOperacao('Entrada')">Confirmar Entrada</button>
        </div>
    </div>

    <script>
        // --- COLE AQUI SUA URL DO WEB APP ---
        const URL_GAS = "https://script.google.com/macros/s/AKfycby8ksFqFgWbXwM6yYe2NtT6ciOMSdIKxfNsOEyTKCMTrbINhykPEEphnSpe-MCFZHYs/exec";
        // ------------------------------------

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
        }

        async function fazerLogin() {
            const id = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            const response = await fetch(`${URL_GAS}?id=${id}&password=${pass}`);
            const data = await response.json();
            
            if (data.autorizado) {
                navigateTo('menu');
            } else {
                alert("Acesso negado!");
            }
        }

        async function confirmarOperacao(tipo) {
            const prefix = tipo === 'Retirada' ? 'out' : 'in';
            const payload = {
                tipo: tipo,
                idItem: document.getElementById(`${prefix}-id`).value,
                qtd: document.getElementById(`${prefix}-qtd`).value,
                responsavel: document.getElementById(tipo === 'Retirada' ? 'out-colab' : 'in-ref').value,
                dataHora: new Date().toLocaleString()
            };

            await fetch(URL_GAS, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            alert(tipo + " enviada com sucesso!");
            navigateTo('menu');
        }
    </script>
</body>
</html>

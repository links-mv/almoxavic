<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VIC</title>
    
    <!-- Link crucial que avisa ao navegador que isso é um PWA -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Configurações específicas para o Safari do iPhone rodar bem -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Portal VIC">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./logo-pwa.png">
    
    <style>
        /* Estilo básico, limpo e focado em mobile (Responsivo) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .logo-placeholder {
            width: 80px;
            height: 80px;
            background-color: #1c355e;
            color: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 20px;
        }
        h1 {
            color: #1c355e;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .instruction-box {
            background-color: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #4a5568;
            border-left: 4px solid #1c355e;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="logo-placeholder">VIC</div>
        <h1>Portal VIC</h1>
        <p>Seu sistema de automação e gestão logística, direto na tela do seu celular.</p>
        
        <div class="instruction-box">
            <strong>Como instalar:</strong><br>
            • No Android: Clique no banner ou nos 3 pontinhos e "Instalar aplicativo".<br>
            • No iPhone: Toque no botão de compartilhar (quadrado com seta) e escolha "Adicionar à Tela de Início".
        </div>
    </div>

    <!-- Script que liga o Service Worker e ativa o PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker ativo no escopo:', reg.scope))
                    .catch(err => console.error('Erro ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>

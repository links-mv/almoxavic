<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxavic | Gestão</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00529b">
    <link rel="apple-touch-icon" href="https://www.vli-logistica.com.br/wp-content/uploads/2023/09/cropped-logotipo-1-1-1.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #004482; 
            --bg-blue: #00529b; 
            --bg-card: #ffffff; 
            --dark: #222222;
            --danger: #dc2626;
            --warning: #d97706;
            --success: #16a34a;
            --border: #ddd;
            
            --cor-entrada: #00529b;      
            --cor-retirada: #EF7A1D;     
            --cor-estoque: #6b7280;      
            --cor-relatorio: #86efac;    
            --txt-relatorio: #064e3b;    
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-blue); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 420px; position: relative; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
        
        .user-greeting { text-align: center; font-size: 1.1rem; font-weight: 600; color: var(--primary); margin-bottom: 20px; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 1rem; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; color: white; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-primary { background: var(--primary); }
        .btn-outline { background: transparent; border: 1px solid #999; color: #555; margin-top: 10px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .menu-btn { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; font-size: 0.85rem; text-align: center; padding: 10px; }
        .menu-btn i { font-size: 2rem; }
        
        .btn-menu-entrada { background: var(--cor-entrada); color: white; }
        .btn-menu-retirada { background: var(--cor-retirada); color: white; }
        .btn-menu-estoque { background: var(--cor-estoque); color: white; }
        .btn-menu-relatorio { background: var(--cor-relatorio); color: var(--txt-relatorio); }

        .cart-box { background: #f9f9f9; border: 1px dashed #ccc; padding: 10px; border-radius: 8px; margin-bottom: 15px; min-height: 50px; max-height: 140px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 5px 0; border-bottom: 1px solid #eee; }
        .cart-remove { color: var(--danger); cursor: pointer; font-weight: bold; padding: 0 5px; }

        .stock-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .stock-table th, .stock-table td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: left; font-size: 0.9rem; }
        
        /* NOVO: Estilos do Dropdown Customizado para Mobile */
        .dropdown-wrapper { position: relative; width: 100%; }
        .dropdown-list {
            display: none; position: absolute; top: 100%; left: 0; width: 100%;
            background: white; border: 1px solid var(--primary); border-radius: 4px;
            max-height: 180px; overflow-y: auto; z-index: 999; list-style: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-top: 2px;
        }
        .dropdown-list li { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; cursor: pointer; color: #333; }
        .dropdown-list li:active, .dropdown-list li:hover { background: #e0f2fe; color: var(--primary); font-weight: 500; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 30px 20px; border-radius: 16px; text-align: center; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .report-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .report-tabs button { padding: 8px; font-size: 0.8rem; background: #e0e0e0; color: #333; }
        .report-tabs button.active { background: var(--primary); color: white; }
        .report-list { list-style: none; font-size: 0.9rem; max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 6px; }
        .report-list li { padding: 10px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; }
        
        #status-msg { display: none; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: 500; font-size: 0.9rem;}
        .loading { background: #e0f2fe; color: #075985; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="card">
        <div id="status-msg"></div>

        <div id="screen-login" class="screen">
            <div class="logo-container"><img src="https://www.vli-logistica.com.br/wp-content/uploads/2023/09/cropped-logotipo-1-1-1.png" alt="Logo" onerror="this.outerHTML='<h2>ALMOXAVIC</h2>'"></div>
            <div class="input-group"><input type="text" id="login-user" placeholder="Matrícula (ID)"></div>
            <div class="input-group"><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-primary" onclick="fazerLogin()">Acessar</button>
        </div>

        <div id="screen-menu" class="screen">
            <div class="user-greeting" id="saudacao-user">Boa tarde, Usuário</div>
            <div class="menu-grid">
                <button class="menu-btn btn-menu-entrada" onclick="abrirTela('entrada')">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrada
                </button>
                <button class="menu-btn btn-menu-retirada" onclick="abrirTela('retirada')">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Retirada
                </button>
                <button class="menu-btn btn-menu-estoque" onclick="abrirTela('estoque')">
                    <i class="fa-solid fa-boxes-stacked"></i> Estoque Atual
                </button>
                <button class="menu-btn btn-menu-relatorio" onclick="abrirTela('relatorios')">
                    <i class="fa-solid fa-chart-pie"></i> Relatórios
                </button>
            </div>
            <button class="btn-outline" onclick="deslogar()">Sair (Desconectar)</button>
        </div>

        <div id="screen-retirada" class="screen">
            <h3 style="margin-bottom: 15px; text-align:center;">Retirada de Materiais</h3>
            <div class="input-group">
                <label>Para quem? (Matrícula/Nome)</label>
                <input type="text" id="out-quem" placeholder="Digite quem está recebendo">
            </div>
            <div class="input-group">
                <label>Item (Apenas disponíveis)</label>
                <div class="dropdown-wrapper">
                    <input type="text" id="out-item" placeholder="Comece a digitar o EPI..." autocomplete="off"
                           onfocus="mostrarLista('out')" oninput="filtrarLista('out')" onblur="ocultarLista('out')">
                    <ul id="lista-out" class="dropdown-list"></ul>
                </div>
            </div>
            <div class="input-group" style="display:flex; gap:10px;">
                <input type="number" id="out-qtd" placeholder="Qtd" style="width: 40%;">
                <button class="btn-primary" style="width: 60%;" onclick="adicionarAoCarrinho('Retirada')">+ Adicionar</button>
            </div>
            <label style="font-size: 0.85rem; color:#555;">Lista de Retirada:</label>
            <div class="cart-box" id="cart-list-out"><span style="color:#999; font-size: 0.8rem;">Vazio...</span></div>
            <button style="background: var(--cor-retirada);" onclick="confirmarProcesso('Retirada')">Confirmar Retirada</button>
            <button class="btn-outline" onclick="abrirTela('menu')">Voltar</button>
        </div>

        <div id="screen-entrada" class="screen">
            <h3 style="margin-bottom: 15px; text-align:center;">Entrada de Materiais</h3>
            <div class="input-group">
                <label>Selecione o Item</label>
                <div class="dropdown-wrapper">
                    <input type="text" id="in-item" placeholder="Comece a digitar o EPI..." autocomplete="off"
                           onfocus="mostrarLista('in')" oninput="filtrarLista('in')" onblur="ocultarLista('in')">
                    <ul id="lista-in" class="dropdown-list"></ul>
                </div>
            </div>
            <div class="input-group" id="box-novo-item" style="display:none;"><label style="color:var(--cor-retirada);">Nome Novo Item</label><input type="text" id="in-novo-nome"></div>
            <div class="input-group" style="display:flex; gap:10px;"><input type="number" id="in-qtd" placeholder="Qtd" style="width: 40%;"><button style="background: var(--cor-entrada);" onclick="adicionarAoCarrinho('Entrada')">+ Adicionar</button></div>
            <label style="font-size: 0.85rem; color:#555;">Lista de Entrada:</label>
            <div class="cart-box" id="cart-list-in"><span style="color:#999; font-size: 0.8rem;">Vazio...</span></div>
            <button style="background: var(--primary);" onclick="confirmarProcesso('Entrada')">Registrar Entrada</button>
            <button class="btn-outline" onclick="abrirTela('menu')">Voltar</button>
        </div>

        <div id="screen-estoque" class="screen">
            <h3 style="margin-bottom: 15px; text-align:center;">Estoque Disponível</h3>
            <div style="max-height: 300px; overflow-y: auto;">
                <table class="stock-table"><thead><tr><th>Item</th><th>Qtd</th></tr></thead><tbody id="stock-tbody"></tbody></table>
            </div>
            <button class="btn-outline" onclick="abrirTela('menu')">Voltar</button>
        </div>

        <div id="screen-relatorios" class="screen">
            <h3 style="margin-bottom: 15px; text-align:center;">Análise de Estoque</h3>
            <div class="report-tabs">
                <button id="btn-rel-falta" onclick="gerarRelatorio('falta')">Em Falta</button>
                <button id="btn-rel-baixo" onclick="gerarRelatorio('baixo')">Baixo (< 5)</button>
                <button id="btn-rel-tudo" onclick="gerarRelatorio('tudo')">Tudo q/ Tem</button>
            </div>
            <ul class="report-list" id="report-view"></ul>
            <button class="btn-outline" onclick="abrirTela('menu')">Voltar</button>
        </div>
    </div>

    <div id="modal-sucesso" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <i class="fa-solid fa-circle-check" style="color: var(--success); font-size: 4rem; margin-bottom: 10px;"></i>
            <h2 style="color: var(--dark); margin-bottom: 10px;">Sucesso!</h2>
            <p id="modal-msg-texto" style="color: #555; margin-bottom: 20px;">Lote registrado com sucesso.</p>
            <button class="btn-primary" onclick="fecharModal()">OK, Continuar</button>
        </div>
    </div>

    <script>
        // --- COLE AQUI SUA URL DO WEB APP ---
        const URL_GAS = "https://script.google.com/macros/s/AKfycbw_nX-tJ5C83-nnDPA_UMY3RKVFuYFQ0DeOcrG2dJHHPY1wrgD6qEVK4-I8yg8CcgMZRg/exec";
        
        let usuarioLogado = null; 
        let baseItems = [], stockItems = [], carrinhoRetirada = [], carrinhoEntrada = [];

        window.onload = () => {
            const save = localStorage.getItem('almoxavic_user');
            if(save) {
                usuarioLogado = JSON.parse(save);
                abrirTela('menu');
                carregarDados();
            } else {
                abrirTela('login');
            }
        };

        function msg(texto, tipo) {
            const el = document.getElementById('status-msg');
            el.textContent = texto; el.className = tipo; el.style.display = 'block';
            if(tipo === 'error') setTimeout(() => el.style.display = 'none', 4000);
        }

        function abrirModal(mensagem) {
            document.getElementById('modal-msg-texto').textContent = mensagem;
            document.getElementById('modal-sucesso').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal-sucesso').style.display = 'none';
        }

        function abrirTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.getElementById('status-msg').style.display = 'none';
            if(id === 'menu') definirSaudacao();
            if(id === 'relatorios') gerarRelatorio('falta');
        }

        function definirSaudacao() {
            if(!usuarioLogado) return;
            const hora = new Date().getHours();
            let compl = "Boa noite";
            if(hora >= 5 && hora < 12) compl = "Bom dia";
            else if(hora >= 12 && hora < 18) compl = "Boa tarde";
            
            let primeiroNome = usuarioLogado.nome.split(' ')[0];
            document.getElementById('saudacao-user').textContent = `${compl}, ${primeiroNome}!`;
        }

        function deslogar() {
            localStorage.removeItem('almoxavic_user');
            usuarioLogado = null;
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            abrirTela('login');
        }

        async function fazerLogin() {
            const id = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;
            if(!id || !pass) return msg("Preencha matrícula e senha!", "error");

            msg("Autenticando...", "loading");
            try {
                const res = await fetch(`${URL_GAS}?action=login&id=${id}&password=${pass}`);
                const data = await res.json();
                if (data.autorizado) {
                    usuarioLogado = { id: id, nome: data.nome || id };
                    localStorage.setItem('almoxavic_user', JSON.stringify(usuarioLogado));
                    abrirTela('menu');
                    carregarDados(); 
                } else { msg("Acesso Negado!", "error"); }
            } catch(e) { msg("Erro de rede ao logar.", "error"); }
        }

        async function carregarDados() {
            msg("Atualizando nuvem...", "loading");
            try {
                const res = await fetch(`${URL_GAS}?action=getData`);
                const data = await res.json();
                baseItems = data.base; stockItems = data.estoque;
                atualizarDropdowns(); atualizarTabelaEstoque();
                msg("", ""); document.getElementById('status-msg').style.display = 'none';
            } catch(e) { msg("Erro ao carregar itens.", "error"); }
        }

        /* --- LÓGICA DO DROPDOWN MOBILE CUSTOMIZADO --- */
        function atualizarDropdowns() {
            window.opcoesIn = [{valor: 'NOVO_ITEM', texto: '+ Adicionar Novo'}];
            baseItems.forEach(i => window.opcoesIn.push({valor: i.nome, texto: `${i.id} - ${i.nome}`}));
            
            window.opcoesOut = [];
            baseItems.forEach(i => {
                const stk = stockItems.find(s => s.id == i.id);
                if (stk && stk.qtd > 0) {
                    window.opcoesOut.push({valor: i.nome, texto: `${i.nome} (Disp: ${stk.qtd})`});
                }
            });
        }

        function renderizarLista(fluxo, termo = '') {
            const ul = document.getElementById(`lista-${fluxo}`);
            const opcoes = fluxo === 'in' ? window.opcoesIn : window.opcoesOut;
            ul.innerHTML = '';
            
            const filtradas = opcoes.filter(o => o.texto.toLowerCase().includes(termo.toLowerCase()));
            
            if(filtradas.length === 0) {
                ul.innerHTML = '<li style="color:#999; cursor:default;">Nenhum item...</li>';
            } else {
                filtradas.forEach(o => {
                    const li = document.createElement('li');
                    li.textContent = o.texto;
                    // Usa mousedown em vez de click para disparar antes do blur do input
                    li.onmousedown = (e) => { 
                        e.preventDefault(); 
                        document.getElementById(`${fluxo}-item`).value = o.valor;
                        ul.style.display = 'none';
                        if(fluxo === 'in') verificarNovoItem();
                    };
                    ul.appendChild(li);
                });
            }
        }

        function mostrarLista(fluxo) {
            renderizarLista(fluxo, document.getElementById(`${fluxo}-item`).value);
            document.getElementById(`lista-${fluxo}`).style.display = 'block';
        }

        function filtrarLista(fluxo) {
            renderizarLista(fluxo, document.getElementById(`${fluxo}-item`).value);
            document.getElementById(`lista-${fluxo}`).style.display = 'block';
            if(fluxo === 'in') verificarNovoItem();
        }

        function ocultarLista(fluxo) {
            document.getElementById(`lista-${fluxo}`).style.display = 'none';
        }
        /* --------------------------------------------- */

        function atualizarTabelaEstoque() {
            const tbody = document.getElementById('stock-tbody'); tbody.innerHTML = '';
            let count = 0;
            stockItems.forEach(stk => {
                if (stk.qtd > 0) {
                    const itemBase = baseItems.find(b => b.id == stk.id);
                    tbody.innerHTML += `<tr><td>${itemBase ? itemBase.nome : `Item ${stk.id}`}</td><td><strong>${stk.qtd}</strong></td></tr>`;
                    count++;
                }
            });
            if(count === 0) tbody.innerHTML = `<tr><td colspan="2" align="center">Estoque vazio.</td></tr>`;
        }

        function verificarNovoItem() { 
            const val = document.getElementById('in-item').value;
            document.getElementById('box-novo-item').style.display = (val === 'NOVO_ITEM') ? 'block' : 'none'; 
        }

        function adicionarAoCarrinho(fluxo) {
            if (fluxo === 'Retirada') {
                const selectVal = document.getElementById('out-item').value.trim(); 
                const qtd = parseInt(document.getElementById('out-qtd').value);
                if(!selectVal || !qtd || qtd < 1) return msg("Dados inválidos.", "error");
                
                carrinhoRetirada.push({ idItem: null, nomeItem: selectVal, qtd: qtd, isNovoItem: false });
                
                document.getElementById('out-qtd').value = ''; 
                document.getElementById('out-item').value = '';
                renderizarCarrinho('Retirada');
            } else {
                const selectVal = document.getElementById('in-item').value.trim(); 
                const qtd = parseInt(document.getElementById('in-qtd').value);
                const novoNome = document.getElementById('in-novo-nome').value.trim();
                
                if(!selectVal || !qtd || qtd < 1) return msg("Dados inválidos.", "error");
                if(selectVal === 'NOVO_ITEM' && !novoNome) return msg("Digite o nome do novo item.", "error");

                if (selectVal === 'NOVO_ITEM') carrinhoEntrada.push({ idItem: null, nomeItem: novoNome, qtd: qtd, isNovoItem: true, nomeNovoItem: novoNome });
                else carrinhoEntrada.push({ idItem: null, nomeItem: selectVal, qtd: qtd, isNovoItem: false });

                document.getElementById('in-qtd').value = ''; 
                document.getElementById('in-novo-nome').value = ''; 
                document.getElementById('in-item').value = '';
                verificarNovoItem(); renderizarCarrinho('Entrada');
            }
        }

        function removerDoCarrinho(i, f) { f === 'Retirada' ? carrinhoRetirada.splice(i, 1) : carrinhoEntrada.splice(i, 1); renderizarCarrinho(f); }

        function renderizarCarrinho(fluxo) {
            const div = document.getElementById(fluxo === 'Retirada' ? 'cart-list-out' : 'cart-list-in');
            const lista = fluxo === 'Retirada' ? carrinhoRetirada : carrinhoEntrada;
            if(lista.length === 0) { div.innerHTML = '<span style="color:#999; font-size: 0.8rem;">Vazio...</span>'; return; }
            div.innerHTML = lista.map((i, idx) => `<div class="cart-item"><span><strong>${i.qtd}x</strong> ${i.nomeItem}</span><span class="cart-remove" onclick="removerDoCarrinho(${idx}, '${fluxo}')"><i class="fa-solid fa-trash-can"></i></span></div>`).join('');
        }

        async function confirmarProcesso(fluxo) {
            let payload = { tipo: fluxo, carrinho: [] };
            payload.quemFez = usuarioLogado.nome; 

            if (fluxo === 'Retirada') {
                const pQuem = document.getElementById('out-quem').value.trim();
                if(!pQuem) return msg("Informe para quem é a retirada.", "error");
                if(carrinhoRetirada.length === 0) return msg("Carrinho vazio.", "error");
                payload.paraQuem = pQuem;
                payload.carrinho = carrinhoRetirada;
            } else {
                if(carrinhoEntrada.length === 0) return msg("Carrinho vazio.", "error");
                payload.carrinho = carrinhoEntrada;
            }

            msg("Processando na nuvem...", "loading");
            try {
                await fetch(URL_GAS, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                
                abrirModal(`O lote de ${fluxo} foi registrado com sucesso na planilha.`);
                
                if(fluxo === 'Retirada') { carrinhoRetirada = []; document.getElementById('out-quem').value = ''; renderizarCarrinho('Retirada'); } 
                else { carrinhoEntrada = []; renderizarCarrinho('Entrada'); }
                
                await carregarDados(); abrirTela('menu');
            } catch(e) { msg("Erro ao salvar lote.", "error"); }
        }

        function gerarRelatorio(tipo) {
            document.querySelectorAll('.report-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-rel-${tipo}`).classList.add('active');
            const ul = document.getElementById('report-view'); ul.innerHTML = '';
            
            let count = 0;
            baseItems.forEach(item => {
                const stk = stockItems.find(s => s.id == item.id);
                const qtd = stk ? stk.qtd : 0;

                if (tipo === 'falta' && qtd === 0) {
                    ul.innerHTML += `<li><span>${item.nome}</span><span style="color:var(--danger); font-weight:bold;">ZERADO</span></li>`; count++;
                } else if (tipo === 'baixo' && qtd > 0 && qtd <= 5) {
                    ul.innerHTML += `<li><span>${item.nome}</span><span style="color:var(--warning); font-weight:bold;">${qtd} un.</span></li>`; count++;
                } else if (tipo === 'tudo' && qtd > 0) {
                    ul.innerHTML += `<li><span>${item.nome}</span><span>${qtd} un.</span></li>`; count++;
                }
            });
            if(count === 0) ul.innerHTML = `<li style="justify-content:center; color:#888;">Nenhum item nesta categoria.</li>`;
        }
    </script>
</body>
</html>
